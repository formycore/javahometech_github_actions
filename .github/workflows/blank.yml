# this is for github actions for terraform
on:
    push:
      branches:
        - terraform_check
jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Login to DockerHub
        uses: docker/login-actions@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build Docker image
        run: docker build -t formycore/aws-terraform:latest .
      
      - name: Push Docker image
        run: docker push -t formycore/aws-terraform:latest 
      
      - name: Run Terraform inside the container
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID=${{secrets.AWS_ACCESS_KEY_ID}}
            -e AWS_SECRET_ACCESS_KEY=${{secrets.AWS_SECRET_ACCESS_KEY}}
            -e AWS_DEFAULT_REGION=ap-south-1 \
            -v ${{ github.workspace }}:/app \
            formycore/aws-terraform:latest \
            bash -c "terraform init && terraform apply -auto-approve"                        
